<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MuTrade 모니터링</title>
  <style>
    * { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #111827; color: #f9fafb; }

    #header {
      background: #1f2937;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #title { font-size: 20px; font-weight: 600; line-height: 1.2; }
    #ws-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #9ca3af; }
    #ws-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; }
    #ws-dot.connected { background: #3b82f6; }
    #ws-dot.reconnecting { background: #f59e0b; }

    #container { max-width: 800px; margin: 32px auto; padding: 0 24px; }

    #symbol-table { width: 100%; border-collapse: collapse; background: #1f2937; table-layout: fixed; }
    #symbol-table th, #symbol-table td {
      padding: 8px 12px;
      font-size: 14px;
      border-bottom: 1px solid #374151;
      text-align: right;
    }
    #symbol-table th { font-weight: 600; color: #9ca3af; line-height: 1.4; }
    #symbol-table td { line-height: 1.5; }
    #symbol-table td:first-child, #symbol-table th:first-child { text-align: left; width: 100px; }
    #symbol-table th:nth-child(2), #symbol-table td:nth-child(2) { width: 120px; }
    #symbol-table th:nth-child(3), #symbol-table td:nth-child(3) { width: 120px; }
    #symbol-table th:nth-child(4), #symbol-table td:nth-child(4) { width: 100px; }
    #symbol-table th:nth-child(5), #symbol-table td:nth-child(5) { width: 120px; text-align: center; }
    #symbol-table tbody tr:hover { background: #374151; }

    /* SELL_PENDING 번짙임 (D-05) */
    @keyframes blink-sell {
      0%, 100% { background-color: #450a0a; }
      50%       { background-color: #7f1d1d; }
    }
    tr.sell-pending { animation: blink-sell 1s ease-in-out infinite; }
    tr.sell-pending td { color: #fca5a5; }
    tr.sell-pending .status-badge { color: #ef4444; font-weight: 600; }

    /* 빈 상태 (D-06) */
    #empty-state { text-align: center; padding: 48px 0; color: #9ca3af; }
    #empty-main { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    #empty-sub { font-size: 12px; color: #6b7280; }

    /* Phase 7 — 제어 UI */
    #header-controls { display: flex; align-items: center; gap: 8px; }

    #dry-run-badge {
      font-size: 12px; font-weight: 600; padding: 4px 8px;
      border-radius: 4px; cursor: pointer; user-select: none;
    }

    #btn-start, #btn-stop {
      font-size: 14px; font-weight: 600; padding: 8px 16px;
      border-radius: 6px; border: none; cursor: pointer; color: #fff;
    }
    #btn-start { background: #3b82f6; }
    #btn-start:hover:not(:disabled) { background: #2563eb; }
    #btn-stop { background: #dc2626; }
    #btn-stop:hover:not(:disabled) { background: #b91c1c; }
    #btn-start:disabled, #btn-stop:disabled {
      background: #374151; color: #6b7280; cursor: not-allowed;
    }

    #banner {
      display: none; padding: 12px 24px; font-size: 14px; font-weight: 400;
    }

    /* 즉시 매도 버튼 — 테이블 셀 내 */
    .sell-btn {
      font-size: 12px; font-weight: 600; padding: 4px 8px;
      border-radius: 4px; border: none; cursor: pointer;
      background: #dc2626; color: #fff;
    }
    .sell-btn:hover:not(:disabled) { background: #b91c1c; }
    .sell-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    /* 테이블 6번째 열 */
    #symbol-table th:nth-child(6), #symbol-table td:nth-child(6) { width: 80px; text-align: center; }
  </style>
</head>
<body>
  <!-- header bar -->
  <div id="header">
    <span id="title">MuTrade 모니터링</span>
    <div id="header-controls">
      <span id="dry-run-badge" onclick="toggleDryRun()"
        style="background:#78350f;color:#fbbf24;">드라이런</span>
      <button id="btn-start" onclick="startBot()">시작</button>
      <button id="btn-stop" onclick="stopBot()" disabled>중지</button>
      <span id="ws-status">
        <span id="ws-dot"></span>
        <span id="ws-text">연결 중...</span>
      </span>
    </div>
  </div>

  <div id="banner" role="alert"></div>

  <!-- main container -->
  <div id="container">
    <table id="symbol-table">
      <thead>
        <tr>
          <th>종목코드</th>
          <th>현재가</th>
          <th>고점</th>
          <th>하락률</th>
          <th>상태</th>
          <th>액션</th>
        </tr>
      </thead>
      <tbody id="symbol-table-body"></tbody>
    </table>
    <div id="empty-state" style="display:none">
      <p id="empty-main">봇 대기 중</p>
      <p id="empty-sub">장 운영 시간(09:00~15:30 KST)에 자동 시작됩니다</p>
    </div>
  </div>

  <script>
    let ws;
    var _lastSnapshot = {};
    var bannerTimer = null;

    function getDropColor(dropPct) {
      // UI-SPEC.md 하락률 숫자 색상
      if (dropPct <= -9) return '#ef4444';
      if (dropPct <= -5) return '#f59e0b';
      return '#9ca3af';
    }

    function fmtPrice(v) {
      // UI-SPEC.md: 84,500원 포맷
      if (!v || v === 0) return '—';
      return v.toLocaleString('ko-KR') + '원';
    }

    function fmtDrop(v, warm) {
      // UI-SPEC.md: warm=false 시 '—', 그 외 -3.25% 포맷
      if (!warm) return '—';
      if (v === null || v === undefined) return '—';
      return v.toFixed(2) + '%';
    }

    function getStatusText(sym) {
      // UI-SPEC.md 상태 배지 텍스트 매핑
      if (sym.sell_pending) return '매도 대기';
      if (!sym.warm) return '워밍업';
      return '모니터링 중';
    }

    function sanitizeCode(code) {
      // T-06-08: KIS 종목코드(6자리 숫자)만 허용 — XSS innerHTML 삽입 방어
      if (typeof code !== 'string') return '';
      return code.replace(/[^0-9A-Za-z]/g, '');
    }

    function setStatus(state) {
      // state: 'connected' | 'reconnecting' | 'disconnected'
      var dot = document.getElementById('ws-dot');
      var text = document.getElementById('ws-text');
      dot.className = state === 'connected' ? 'connected' : (state === 'reconnecting' ? 'reconnecting' : '');
      var labels = { connected: '실시간 연결', reconnecting: '재연결 중...', disconnected: '연결 끊김' };
      text.textContent = labels[state] || '연결 중...';
    }

    function showBanner(msg, type) {
      var el = document.getElementById('banner');
      if (!el) return;
      el.textContent = msg;
      el.style.display = 'block';
      el.style.background = type === 'success' ? '#14532d' : '#7f1d1d';
      el.style.color = type === 'success' ? '#86efac' : '#fca5a5';
      if (bannerTimer) clearTimeout(bannerTimer);
      bannerTimer = setTimeout(function() { el.style.display = 'none'; }, 4000);
    }

    function updateDryRunBadge(isDryRun) {
      var badge = document.getElementById('dry-run-badge');
      if (!badge) return;
      badge.textContent = isDryRun ? '드라이런' : '실매도';
      badge.style.background = isDryRun ? '#78350f' : '#7f1d1d';
      badge.style.color = isDryRun ? '#fbbf24' : '#f87171';
    }

    function startBot() {
      fetch('/api/start', {method: 'POST'})
        .then(function(r) {
          return r.json().then(function(body) { return {ok: r.ok, body: body}; });
        })
        .then(function(res) {
          if (!res.ok) showBanner(res.body.detail || '시작 실패', 'error');
        })
        .catch(function(e) { showBanner('요청 실패: ' + e, 'error'); });
    }

    function stopBot() {
      var hasPending = Object.keys(_lastSnapshot).some(function(k) {
        return k !== '_meta' && _lastSnapshot[k] && _lastSnapshot[k].sell_pending;
      });
      if (hasPending) {
        if (!confirm('매도 진행 중인 종목이 있습니다. 그래도 중지하시겠습니까?')) return;
      }
      fetch('/api/stop', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .catch(function(e) { showBanner('요청 실패: ' + e, 'error'); });
    }

    function toggleDryRun() {
      fetch('/api/toggle-dry-run', {method: 'POST'})
        .then(function(r) {
          return r.json().then(function(body) { return {ok: r.ok, body: body}; });
        })
        .then(function(res) {
          if (res.ok && res.body.ok) showBanner(res.body.message, 'success');
          else showBanner(res.body.detail || res.body.message || '토글 실패', 'error');
        })
        .catch(function(e) { showBanner('요청 실패: ' + e, 'error'); });
    }

    function manualSell(code) {
      if (!confirm('[' + code + ']을(를) 시장가로 매도하시겠습니까?')) return;
      fetch('/api/sell/' + code, {method: 'POST'})
        .then(function(r) {
          return r.json().then(function(body) { return {ok: r.ok, body: body}; });
        })
        .then(function(res) {
          if (res.ok) showBanner(res.body.message || '매도 주문 제출됨 — 체결 확인 필요', 'success');
          else showBanner('매도 실패: ' + (res.body.detail || res.body.message || '오류'), 'error');
        })
        .catch(function(e) { showBanner('요청 실패: ' + e, 'error'); });
    }

    function renderTable(data) {
      var tbody = document.getElementById('symbol-table-body');
      var emptyState = document.getElementById('empty-state');
      var table = document.getElementById('symbol-table');

      // _meta 키 제외 — Pitfall 4 방어
      var symbols = {};
      Object.keys(data).forEach(function(k) {
        if (k !== '_meta') symbols[k] = data[k];
      });

      var keys = Object.keys(symbols);
      if (keys.length === 0) {
        tbody.innerHTML = '';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }
      table.style.display = '';
      emptyState.style.display = 'none';
      tbody.innerHTML = keys.map(function(code) {
        var sym = symbols[code];
        var isPending = sym.sell_pending;
        var dropColor = getDropColor(sym.drop_pct);
        var safeCode = sanitizeCode(sym.code);
        var sellBtn = '<button class="sell-btn" onclick="manualSell(\'' + safeCode + '\')" ' +
          (isPending ? 'disabled' : '') + '>즉시 매도</button>';
        return '<tr class="' + (isPending ? 'sell-pending' : '') + '">' +
          '<td>' + safeCode + '</td>' +
          '<td>' + fmtPrice(sym.current_price) + '</td>' +
          '<td>' + fmtPrice(sym.peak_price) + '</td>' +
          '<td style="color:' + dropColor + '">' + fmtDrop(sym.drop_pct, sym.warm) + '</td>' +
          '<td><span class="status-badge">' + getStatusText(sym) + '</span></td>' +
          '<td style="text-align:center;">' + sellBtn + '</td>' +
          '</tr>';
      }).join('');
    }

    function connect() {
      // D-03: setTimeout 자동 재연결
      ws = new WebSocket('ws://' + location.host + '/ws');
      ws.onopen = function() { setStatus('connected'); };
      ws.onmessage = function(e) {
        try {
          var data = JSON.parse(e.data);
          _lastSnapshot = data;
          var meta = data._meta || {};
          var isRunning = meta.is_running || false;
          var isDryRun = meta.dry_run !== undefined ? meta.dry_run : true;

          var btnStart = document.getElementById('btn-start');
          var btnStop = document.getElementById('btn-stop');
          if (btnStart) btnStart.disabled = isRunning;
          if (btnStop) btnStop.disabled = !isRunning;

          updateDryRunBadge(isDryRun);
          renderTable(data);
        } catch(err) { console.error('parse error', err); }
      };
      ws.onclose = function() { setStatus('reconnecting'); setTimeout(connect, 3000); };
      ws.onerror = function() { ws.close(); };
    }

    connect();
  </script>
</body>
</html>
